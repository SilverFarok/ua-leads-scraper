{% extends "layout.html" %}
{% block title %}Run #{{ run.id }}{% endblock %}
{% block content %}
<div class="page-head">
    <div>
        <h1>Run #{{ run.id }}</h1>
        <p class="muted">{{ run.mode }}{% if campaign %} - {{ campaign.name }}{% endif %}</p>
    </div>
    <div class="actions">
        {% if run.status != "running" %}
        <form method="post" action="/runs/{{ run.id }}/delete" onsubmit="return confirm('Delete this run?');">
            <button class="button button-danger" type="submit">Delete Run</button>
        </form>
        {% endif %}
        <a class="button button-secondary" href="/runs">Back to Runs</a>
    </div>
</div>

<div id="run-status"
     hx-get="/runs/{{ run.id }}/status"
     hx-trigger="load, every 5s"
     hx-swap="innerHTML">
    {% include "runs/_status.html" %}
</div>
{% endblock %}
